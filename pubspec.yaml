name: highlights
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  device_preview: ^1.3.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  percent_indicator: ^4.2.3
  pinput: ^6.0.2
  image_picker: ^1.2.1
  get: ^4.7.3
  table_calendar: ^3.0.9
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4


# ✅ MUST be OUTSIDE dev_dependencies
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/